<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // CONFIGURACIÓN DE TU PROYECTO (Pega lo que copiaste en el Paso 2)
  const firebaseConfig = {
    apiKey: "AIzaSyD-oWfBw6aCb9s63sENTQAjlfpXfo_L5w4",
    authDomain: "kalyjr.firebaseapp.com",
    projectId: "kalyjr",
    storageBucket: "kalyjr.firebasestorage.app",
    messagingSenderId: "553377270177",
    appId: "1:553377270177:web:61f60af35097a7016163e0"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Función para guardar Venta en la base de datos
  window.addSale = async () => {
    const item = document.getElementById('product-select').value;
    try {
      await addDoc(collection(db, "ventas"), {
        producto: item,
        fecha: new Date().toLocaleString()
      });
      alert("Venta guardada en la nube!");
    } catch (e) { console.error("Error: ", e); }
  }

  // Función para guardar Inscripción
  window.addMember = async () => {
    const name = document.getElementById('member-name').value;
    const pay = document.getElementById('payment').value;
    try {
      await addDoc(collection(db, "inscripciones"), {
        nombre: name,
        pago: pay,
        fecha: new Date().toLocaleString()
      });
      alert("Socio registrado en la nube!");
    } catch (e) { console.error("Error: ", e); }
  }
</script>
