<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Gym Staff System</title>
    <style>
        :root { --red: #d40000; --dark: #121212; --gray: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--gray); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { border-bottom: 2px solid var(--red); padding-bottom: 10px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #b00000; }
        .hidden { display: none; }
        .menu-grid { display: grid; gap: 15px; margin-top: 20px; }
        .btn-alt { background: #444; }
    </style>
</head>
<body>

    <div id="section-login" class="container">
        <h2>🥊 STAFF LOGIN</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="checkLogin()">ENTRAR</button>
    </div>

    <div id="section-menu" class="container hidden">
        <h2>MENÚ PRINCIPAL</h2>
        <div class="menu-grid">
            <button onclick="show('section-sales')">🛒 REGISTRAR VENTA</button>
            <button onclick="show('section-enroll')">👤 NUEVA INSCRIPCIÓN</button>
            <button style="background:#222; border: 1px solid #555;" onclick="loadAdminReport()">📊 VER REPORTES</button>
            <button class="btn-alt" onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <div id="section-sales" class="container hidden">
        <h2>REGISTRAR VENTA</h2>
        <select id="prod-name">
            <option value="Vendas-15">Vendas ($15, registrar 2 por par)</option>
            <option value="Aguac-10">Agua Chica ($10)</option>
            <option value="Aguag-20">Agua Grande ($20)</option>
            <option value="Gatorade-15">Gatorade Chico ($15)</option>
            <option value="Poweradem-25">Powerade Mediano ($25)</option>
            <option value="Poweradeg-35">Powerade Grande ($35)</option>
            <option value="Prime-30">Prime ($30)</option>
            <option value="Oikos-50">Oikos proteina ($50)</option>
            <option value="Orgain-40">Orgain proteina ($40)</option>
            <option value="Propel-30">Propel ($30)</option>
            <option value="Suero-35">Electrolit ($35)</option>
            <option value="Camiseta-300">Camiseta ($300)</option>
        </select>
        <button id="btn-save-sale">GUARDAR VENTA</button>
        <button class="btn-alt" onclick="show('section-menu')">Volver</button>
    </div>

    <div id="section-enroll" class="container hidden">
        <h2>INSCRIPCIÓN</h2>
        <input type="text" id="member-name" placeholder="Nombre completo del socio">
        <input type="number" id="member-pay" placeholder="Monto del pago ($)">
        <button id="btn-save-member">REGISTRAR SOCIO</button>
        <button class="btn-alt" onclick="show('section-menu')">Volver</button>
    </div>

    <div id="section-admin" class="container hidden" style="max-width: 500px;">
        <h2>📊 REPORTE DE HOY</h2>
        <div id="admin-data" style="text-align: left; background: #222; padding: 15px; border-radius: 5px; max-height: 300px; overflow-y: auto;">
        </div>
        <button class="btn-alt" onclick="show('section-menu')" style="margin-top:15px;">Volver al Menú</button>
    </div>

    <script type="module">
    // 1. IMPORTAR LIBRERÍAS (Asegúrate de incluir 'getDocs', 'query' y 'orderBy')
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. CONFIGURACIÓN (¡PON TUS LLAVES AQUÍ OTRA VEZ!)
    const firebaseConfig = {
        apiKey: "AIzaSyD-oWfBw6aCb9s63sENTQAjlfpXfo_L5w4",
        authDomain: "kalyjr.firebaseapp.com",
        projectId: "kalyjr",
        storageBucket: "kalyjr.firebasestorage.app",
        messagingSenderId: "553377270177",
        appId: "1:553377270177:web:61f60af35097a7016163e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 3. NAVEGACIÓN
    window.show = (id) => {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.checkLogin = () => {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "admin" && p === "box123") {
            show('section-menu');
        } else {
            alert("Acceso denegado");
        }
    };

    window.logout = () => location.reload();

    // 4. GUARDAR DATOS
    document.getElementById('btn-save-sale').onclick = async () => {
        const seleccion = document.getElementById('prod-name').value; // Trae "Vendas-10"
        const partes = seleccion.split('-'); // Lo divide en ["Vendas", "10"]
        const nombreProd = partes[0];
        const precioProd = Number(partes[1]);
    
        try {
            await addDoc(collection(db, "ventas"), {
                item: nombreProd,
                precio: precioProd, // ¡Ahora guardamos el precio como número!
                fecha: new Date().toLocaleString()
            });
            alert("Venta registrada: " + nombreProd + " por $" + precioProd);
            show('section-menu');
        } catch (e) { alert("Error al guardar"); }
    };

    document.getElementById('btn-save-member').onclick = async () => {
        const nombre = document.getElementById('member-name').value;
        const monto = document.getElementById('member-pay').value;
        if(!nombre || !monto) return alert("Llena todos los campos");
        try {
            await addDoc(collection(db, "inscripciones"), {
                nombre: nombre,
                pago: monto,
                fecha: new Date().toLocaleString()
            });
            alert("Socio registrado con éxito");
            show('section-menu');
        } catch (e) { alert("Error al guardar"); }
    };

    // 5. FUNCIÓN DEL REPORTE (La parte que te faltaba)
    // Importamos 'deleteDoc' y 'doc' para poder borrar

    window.loadAdminReport = async () => {
        const passAdmin = prompt("Introduce la clave de Jefe:");
        if (passAdmin !== "2026") return alert("Clave incorrecta"); // Usa tu nueva clave aquí
    
        show('section-admin');
        const display = document.getElementById('admin-data');
        display.innerHTML = "<p>Cargando registros...</p>";
        
        try {
            const q = query(collection(db, "ventas"), orderBy("fecha", "desc"));
            const querySnapshot = await getDocs(q);
            
            let html = "";
            let ultimaFecha = "";
            let totalDia = 0;
    
            querySnapshot.forEach((documento) => {
                const data = documento.data();
                const id = documento.id; // El ID único de Firebase para esta venta
                const fechaDia = data.fecha.split(',')[0]; 
                const precio = data.precio || 0;
    
                if (fechaDia !== ultimaFecha) {
                    if (ultimaFecha !== "") {
                        html += `<div style="text-align:right; color:#00ff00; font-weight:bold; margin-bottom:10px;">TOTAL DÍA: $${totalDia}</div><hr>`;
                    }
                    html += `<div style="background:#444; padding:5px; margin-top:15px; border-radius:3px; font-weight:bold; color:#ff4444;">📅 FECHA: ${fechaDia}</div>`;
                    ultimaFecha = fechaDia;
                    totalDia = 0;
                }
    
                totalDia += precio;
                
                // Aquí añadimos el botón de eliminar (basurita roja 🗑️)
                html += `<div style='padding:8px; border-bottom:1px solid #333; font-size:14px; display:flex; justify-content:space-between; align-items:center;'>
                            <span>🛒 ${data.item} - $${precio}</span>
                            <button onclick="deleteSale('${id}')" style="width:30px; padding:2px; background:red; font-size:10px; margin:0;">X</button>
                         </div>`;
            });
    
            if (ultimaFecha !== "") {
                html += `<div style="text-align:right; color:#00ff00; font-weight:bold; margin-top:5px;">TOTAL DÍA: $${totalDia}</div>`;
            }
    
            display.innerHTML = html || "<p>No hay ventas.</p>";
        } catch (e) { console.error(e); }
    };
    
    // 2. FUNCIÓN PARA BORRAR (Añádela debajo de la anterior)
    window.deleteSale = async (id) => {
        if (confirm("¿Seguro que quieres borrar esta venta?")) {
            try {
                await deleteDoc(doc(db, "ventas", id));
                alert("Venta eliminada");
                loadAdminReport(); // Recargamos el reporte para que ya no aparezca
            } catch (e) {
                alert("Error al borrar");
            }
        }
    };
    </script>
</body>
</html>
