<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Page</title>
</head>
<body>
    <h1>Enrollment Form</h1>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="payment-date">Payment Date:</label>
        <input type="date" id="payment-date" name="payment-date" required>

        <label for="schedule">Schedule:</label>
        <select id="schedule" name="schedule" required>
            <option value="morning">Morning</option>
            <option value="afternoon">Afternoon</option>
            <option value="evening">Evening</option>
        </select>

        <label for="payment-method">Payment Method:</label>
        <select id="payment-method" name="payment-method" required>
            <option value="credit-card">Credit Card</option>
            <option value="paypal">PayPal</option>
            <option value="bank-transfer">Bank Transfer</option>
        </select>

        <input type="submit" value="Enroll">
    </form>

    <h2>Admin Reports</h2>
    <section id="sales-report">
        <h3>Sales Report</h3>
        <p>Monthly Totals:</p>
        <ul>
            <li>January: $XXXX</li>
            <li>February: $XXXX</li>
            <li>March: $XXXX</li>
            <!-- Add more months as necessary -->
        </ul>
    </section>

    <section id="enrollment-report">
        <h3>Enrollment Report</h3>
        <p>Monthly Totals:</p>
        <ul>
            <li>January: XX enrollments</li>
            <li>February: XX enrollments</li>
            <li>March: XX enrollments</li>
            <!-- Add more months as necessary -->
        </ul>
    </section>
</body>
</html>
